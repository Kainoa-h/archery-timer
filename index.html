<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Readable Timer main</title>
  <style>
  </style>
</head>

<body id="app">
  <div class="timer-container">
    <div class="column-labels">
      <div id="detail-left-lbl" class="label">A</div>
      <div id="detail-right-lbl" class="label">B</div>
    </div>
    <div class="column-squares">
      <div class="square" id="stop"></div>
      <div class="square" id="warn"></div>
      <div class="square" id="shoot"></div>
    </div>
    <div class="column-timer">
      <div class="timer-display" id="timer">180</div>
    </div>
  </div>

  <div id="settings-lip">
    <div class="settings-handle"></div>
    <div id="settings-panel">
      <form id="settings-form">
        <div class="presets-scroll">
          <button type="button" class="preset-btn" data-live="180" data-warn="10" data-standby="10">6 arrows</button>
          <button type="button" class="preset-btn" data-live="90" data-warn="10" data-standby="10">3 arrows</button>
          <button type="button" class="preset-btn" data-live="90" data-warn="10" data-standby="10" data-double="0">IKO</button>
          <button type="button" class="preset-btn" data-live="120" data-warn="10" data-standby="10" data-double="0">TKO</button>
          <button type="button" class="preset-btn" data-live="60" data-warn="10" data-standby="10" data-double="0">Shoot-Off</button>
          <button type="button" class="preset-btn" data-live="60" data-warn="10" data-standby="10" data-double="0">Team Shoot-Off</button>
        </div>
        <div class="settings-row">
          <label for="set-live-time">Live Time (seconds)</label>
          <input type="number" id="set-live-time" min="1">
        </div>
        <div class="settings-row">
          <label for="set-warning-time">Warning Time (seconds)</label>
          <input type="number" id="set-warning-time" min="1">
        </div>
        <div class="settings-row">
          <label for="set-standby-time">Standby Time (seconds)</label>
          <input type="number" id="set-standby-time" min="1">
        </div>
        <div class="settings-row">
          <label>Set Current Detail</label>
          <div class="detail-selector">
            <button type="button" class="detail-btn" data-detail="1">1</button>
            <button type="button" class="detail-btn" data-detail="2">2</button>
            <button type="button" class="detail-btn" data-detail="3">2</button>
            <button type="button" class="detail-btn" data-detail="4">1</button>
          </div>
        </div>
        <div class="settings-row">
          <label for="set-double-detail">Double Detail</label>
          <input type="checkbox" id="set-double-detail">
        </div>
        <div class="settings-row">
          <label for="set-volume">Volume</label>
          <input type="range" id="set-volume" min="0" max="1" step="0.05" value="1">
        </div>
        <div id="settings-error" class="settings-error"></div>
      </form>
    </div>
  </div>

  <div id="intro-modal" class="intro-modal">
    <div class="intro-content">
      <h2>How to use</h2>
      <ul>
        <li>Press <strong>Space</strong> to start or stop the timer.</li>
        <li>Move your cursor to the bottom middle of the screen to adjust settings.</li>
      </ul>
      <button id="intro-close" class="intro-close">Got it</button>
    </div>
  </div>

</body>
<footer>
  <script type="module" src="/src/main.js"></script>
</footer>

</html>
